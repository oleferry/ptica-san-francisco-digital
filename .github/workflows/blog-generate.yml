name: Generar artículo de blog

# Cada lunes a las 08:00 UTC (también se puede lanzar a mano)
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generar artículo con Claude (texto) + OpenAI (imagen)
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Abrir Pull Request
        if: steps.gen.outputs.slug != ''
        uses: peter-evans/create-pull-request@v6
        with:
          branch: blog/${{ steps.gen.outputs.slug }}
          commit-message: "blog: ${{ steps.gen.outputs.title }}"
          title: "Nuevo artículo: ${{ steps.gen.outputs.title }}"
          body: |
            Artículo de blog generado automáticamente por Claude.

            **Se publicará solo dentro de 48 h** si no cierras esta PR.
            Si algo no te encaja, edítalo en esta rama o cierra la PR para descartarlo.
          labels: auto-blog
          add-paths: |
            src/content/blog/*.md
            public/blog-covers/*.jpg
